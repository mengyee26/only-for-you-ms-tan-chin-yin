<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lock Screen</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  position: relative;
  touch-action: manipulation;
}

/* 背景 */
.bg {
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
    url("your-background.jpg") center/cover no-repeat;
  filter: blur(10px);
  transform: scale(1.1);
  z-index: 0;
  pointer-events: none; /* 重点：不要挡住点击 */
}

/* 中间微光 */
.bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%);
}

/* 内容 */
.container {
  position: relative;
  z-index: 1;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-top: 40px;
  padding-bottom: 100px;
}

/* 标题 */
.title {
  color: white;
  font-size: 20px;
  margin-bottom: 20px;
  opacity: 0.95;
  text-align: center;
}

/* 密码点 */
.dots {
  display: flex;
  gap: 15px;
  margin-bottom: 40px;
}

.dot {
  width: 14px;
  height: 14px;
  border: 2px solid white;
  border-radius: 50%;
}

/* 数字键盘 */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 80px);
  gap: 20px;
  justify-content: center;
  align-items: center;
}

/* 按钮 */
.key {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  cursor: pointer;
  transition: background 0.2s ease, transform 0.08s ease;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

.key:active {
  background: rgba(255,255,255,0.35);
  transform: scale(0.96);
}

/* 底部 */
.bottom {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 30px;
  z-index: 1;
  display: flex;
  justify-content: space-between;
  padding: 0 40px;
  color: white;
  font-size: 16px;
  opacity: 0.85;
  pointer-events: none;
}

.bottom div {
  pointer-events: auto;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
  <div class="title">Touch ID or Enter Passcode</div>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="keypad">
    <div class="key" data-number="1">1</div>
    <div class="key" data-number="2">2</div>
    <div class="key" data-number="3">3</div>
    <div class="key" data-number="4">4</div>
    <div class="key" data-number="5">5</div>
    <div class="key" data-number="6">6</div>
    <div class="key" data-number="7">7</div>
    <div class="key" data-number="8">8</div>
    <div class="key" data-number="9">9</div>
    <div></div>
    <div class="key" data-number="0">0</div>
    <div></div>
  </div>
</div>

<div class="bottom">
  <div>Emergency</div>
  <div>Cancel</div>
</div>

<script>
const keys = document.querySelectorAll('.key');

keys.forEach(key => {
  key.addEventListener('click', function () {
    console.log('Pressed:', this.dataset.number);
  });
});
</script>

</body>
</html>
