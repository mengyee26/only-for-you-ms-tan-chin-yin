<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Passcode Lock</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif !important;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      position: relative;
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100vh;
      background: url("your-background.jpg") center center / cover no-repeat;
      overflow: hidden;
    }

    /* 灰白模糊层，做成像图2那种雾感，不压黑 */
    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.25);
      pointer-events: none;
      z-index: 1;
    }

    /* 不要黑色遮罩 */
    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background: transparent;
      pointer-events: none;
      z-index: 1;
    }

    .phone {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      margin: 0 auto;
    }

    .title {
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      text-align: center;
      color: #fff;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.35;
      letter-spacing: 0;
      text-shadow: 0 1px 8px rgba(0,0,0,0.12);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif !important;
    }

    .dots {
      position: absolute;
      top: 175px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 18px;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.95);
      background: transparent;
    }

    .dot.filled {
      background: #fff;
    }

    .keypad {
      position: absolute;
      top: 235px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      display: grid;
      grid-template-columns: repeat(3, 72px);
      grid-auto-rows: 72px;
      justify-content: space-between;
      row-gap: 24px;
      column-gap: 24px;
    }

    .key {
      width: 72px;
      height: 72px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.20);
      color: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.10);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      user-select: none;
      -webkit-user-select: none;
    }

    .key:active {
      transform: scale(0.95);
      background: rgba(255,255,255,0.28);
    }

    .num {
      font-size: 18px;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 4px;
      pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif !important;
    }

    .letters {
      font-size: 9px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 1.8px;
      pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif !important;
    }

    .empty {
      width: 72px;
      height: 72px;
    }

    .bottom-left,
    .bottom-right {
      position: absolute;
      top: 560px;
      color: rgba(255,255,255,0.95);
      font-size: 16px;
      font-weight: 400;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 3;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif !important;
    }

    .bottom-left {
      left: 42px;
    }

    .bottom-right {
      right: 42px;
    }

    .message {
      position: absolute;
      top: 600px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      text-align: center;
      min-height: 20px;
      color: #ffbcbc;
      font-size: 14px;
      z-index: 3;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif !important;
    }

    .success-screen {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: url("your-background.jpg") center center / cover no-repeat;
      z-index: 9999;
    }

    .success-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.18);
    }

    .success-text {
      position: relative;
      z-index: 2;
      color: #fff;
      font-size: 28px;
      font-weight: 500;
      text-shadow: 0 2px 10px rgba(0,0,0,0.18);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif !important;
    }

    @media (max-width: 390px) {
      .title { top: 112px; font-size: 16px; }
      .dots { top: 168px; }
      .keypad {
        top: 225px;
        width: 282px;
        grid-template-columns: repeat(3, 68px);
        grid-auto-rows: 68px;
        row-gap: 22px;
        column-gap: 22px;
      }
      .key, .empty {
        width: 68px;
        height: 68px;
      }
      .num { font-size: 17px; }
      .letters { font-size: 8px; }
      .bottom-left, .bottom-right {
        top: 542px;
        font-size: 15px;
      }
      .bottom-left { left: 34px; }
      .bottom-right { right: 34px; }
      .message { top: 580px; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="phone">
      <div class="title">Touch ID or Enter Passcode</div>

      <div class="dots" id="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="keypad">
        <button class="key" data-num="1" type="button">
          <span class="num">1</span>
        </button>

        <button class="key" data-num="2" type="button">
          <span class="num">2</span>
          <span class="letters">ABC</span>
        </button>

        <button class="key" data-num="3" type="button">
          <span class="num">3</span>
          <span class="letters">DEF</span>
        </button>

        <button class="key" data-num="4" type="button">
          <span class="num">4</span>
          <span class="letters">GHI</span>
        </button>

        <button class="key" data-num="5" type="button">
          <span class="num">5</span>
          <span class="letters">JKL</span>
        </button>

        <button class="key" data-num="6" type="button">
          <span class="num">6</span>
          <span class="letters">MNO</span>
        </button>

        <button class="key" data-num="7" type="button">
          <span class="num">7</span>
          <span class="letters">PQRS</span>
        </button>

        <button class="key" data-num="8" type="button">
          <span class="num">8</span>
          <span class="letters">TUV</span>
        </button>

        <button class="key" data-num="9" type="button">
          <span class="num">9</span>
          <span class="letters">WXYZ</span>
        </button>

        <div class="empty"></div>

        <button class="key" data-num="0" type="button">
          <span class="num">0</span>
        </button>

        <div class="empty"></div>
      </div>

      <button class="bottom-left" id="emergencyBtn" type="button">Emergency</button>
      <button class="bottom-right" id="cancelBtn" type="button">Cancel</button>

      <div class="message" id="message"></div>
    </div>
  </div>

  <div class="success-screen" id="successScreen">
    <div class="success-text">Unlocked 💖</div>
  </div>

  <audio id="clickSound" src="typing on phone sound effect.mp3" preload="auto"></audio>
  <audio id="unlockSound" src="unlock.mp3" preload="auto"></audio>

  <script>
    const correctPassword = "1229";
    let input = "";

    const dots = document.querySelectorAll(".dot");
    const keys = document.querySelectorAll(".key");
    const message = document.getElementById("message");
    const successScreen = document.getElementById("successScreen");
    const clickSound = document.getElementById("clickSound");
    const unlockSound = document.getElementById("unlockSound");
    const cancelBtn = document.getElementById("cancelBtn");
    const emergencyBtn = document.getElementById("emergencyBtn");

    function playSound(audio) {
      if (!audio) return;
      try {
        audio.currentTime = 0;
        audio.play();
      } catch (e) {}
    }

    function updateDots() {
      dots.forEach((dot, i) => {
        if (i < input.length) {
          dot.classList.add("filled");
        } else {
          dot.classList.remove("filled");
        }
      });
    }

    function clearInput() {
      input = "";
      updateDots();
      message.textContent = "";
    }

    function checkPassword() {
      if (input === correctPassword) {
        playSound(unlockSound);
        message.style.color = "#d6ffd6";
        message.textContent = "Correct password";
        setTimeout(() => {
          successScreen.style.display = "flex";
        }, 250);
      } else {
        message.style.color = "#ffbcbc";
        message.textContent = "Wrong passcode";
        setTimeout(() => {
          clearInput();
        }, 450);
      }
    }

    function pressNumber(num) {
      if (input.length >= 4) return;
      playSound(clickSound);
      input += num;
      updateDots();
      message.textContent = "";

      if (input.length === 4) {
        setTimeout(checkPassword, 120);
      }
    }

    keys.forEach((key) => {
      key.addEventListener("click", () => {
        pressNumber(key.dataset.num);
      });
    });

    cancelBtn.addEventListener("click", clearInput);
    emergencyBtn.addEventListener("click", clearInput);

    document.addEventListener("keydown", (e) => {
      if (/^[0-9]$/.test(e.key)) {
        pressNumber(e.key);
      }
      if (e.key === "Backspace") {
        input = input.slice(0, -1);
        updateDots();
      }
    });
  </script>
</body>
</html>
