<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passcode</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
      color: white;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, #cfcfcf, #b8b8b8);
    }

    .blur-shape {
      position: absolute;
      width: 220px;
      height: 220px;
      background: rgba(0,0,0,0.35);
      filter: blur(40px);
      border-radius: 30px;
    }

    .shape1 { top: 180px; left: 40px; }
    .shape2 { top: 210px; right: 40px; }
    .shape3 { bottom: 130px; left: 90px; width: 180px; height: 180px; }

    .screen {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding-top: 90px;
    }

    .title {
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 22px;
      text-align: center;
    }

    .dots {
      display: flex;
      gap: 18px;
      margin-bottom: 34px;
      min-height: 16px;
    }

    .dot {
      width: 14px;
      height: 14px;
      border: 2px solid white;
      border-radius: 50%;
      background: transparent;
    }

    .dot.filled {
      background: white;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 86px);
      gap: 18px 22px;
      justify-content: center;
    }

    .key {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.18);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      cursor: pointer;
    }

    .key:active {
      transform: scale(0.96);
      background: rgba(255,255,255,0.28);
    }

    .num {
      font-size: 34px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .letters {
      font-size: 11px;
      letter-spacing: 1px;
      opacity: 0.95;
    }

    .empty {
      visibility: hidden;
    }

    .bottom-row {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, 86px);
      gap: 18px 22px;
      justify-content: center;
      align-items: center;
    }

    .text-btn {
      border: none;
      background: transparent;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    .message {
      margin-top: 24px;
      font-size: 16px;
      min-height: 24px;
      color: #ffe1e1;
    }

    .shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-8px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="bg">
    <div class="blur-shape shape1"></div>
    <div class="blur-shape shape2"></div>
    <div class="blur-shape shape3"></div>
  </div>

  <div class="screen" id="screen">
    <div class="title">Touch ID or Enter Passcode</div>

    <div class="dots">
      <div class="dot" id="dot1"></div>
      <div class="dot" id="dot2"></div>
      <div class="dot" id="dot3"></div>
      <div class="dot" id="dot4"></div>
    </div>

    <div class="keypad">
      <button class="key" onclick="pressKey('1')">
        <div class="num">1</div>
        <div class="letters">&nbsp;</div>
      </button>

      <button class="key" onclick="pressKey('2')">
        <div class="num">2</div>
        <div class="letters">ABC</div>
      </button>

      <button class="key" onclick="pressKey('3')">
        <div class="num">3</div>
        <div class="letters">DEF</div>
      </button>

      <button class="key" onclick="pressKey('4')">
        <div class="num">4</div>
        <div class="letters">GHI</div>
      </button>

      <button class="key" onclick="pressKey('5')">
        <div class="num">5</div>
        <div class="letters">JKL</div>
      </button>

      <button class="key" onclick="pressKey('6')">
        <div class="num">6</div>
        <div class="letters">MNO</div>
      </button>

      <button class="key" onclick="pressKey('7')">
        <div class="num">7</div>
        <div class="letters">PQRS</div>
      </button>

      <button class="key" onclick="pressKey('8')">
        <div class="num">8</div>
        <div class="letters">TUV</div>
      </button>

      <button class="key" onclick="pressKey('9')">
        <div class="num">9</div>
        <div class="letters">WXYZ</div>
      </button>
    </div>

    <div class="bottom-row">
      <button class="text-btn" onclick="clearCode()">Emergency</button>

      <button class="key" onclick="pressKey('0')">
        <div class="num">0</div>
        <div class="letters">&nbsp;</div>
      </button>

      <button class="text-btn" onclick="deleteLast()">Cancel</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const correctPassword = "1234"; // 改成你的4位密码
    let input = "";

    function updateDots() {
      for (let i = 1; i <= 4; i++) {
        const dot = document.getElementById("dot" + i);
        if (i <= input.length) {
          dot.classList.add("filled");
        } else {
          dot.classList.remove("filled");
        }
      }
    }

    function pressKey(num) {
      if (input.length >= 4) return;
      input += num;
      updateDots();
      document.getElementById("message").textContent = "";

      if (input.length === 4) {
        setTimeout(checkPassword, 150);
      }
    }

    function clearCode() {
      input = "";
      updateDots();
      document.getElementById("message").textContent = "";
    }

    function deleteLast() {
      if (input.length > 0) {
        input = input.slice(0, -1);
        updateDots();
      }
      document.getElementById("message").textContent = "";
    }

    function checkPassword() {
      const screen = document.getElementById("screen");
      const message = document.getElementById("message");

      if (input === correctPassword) {
        message.style.color = "#e8ffe8";
        message.textContent = "Access granted...";
        setTimeout(() => {
          window.location.href = "home.html";
        }, 400);
      } else {
        message.style.color = "#ffe1e1";
        message.textContent = "Wrong passcode";
        screen.classList.add("shake");
        setTimeout(() => screen.classList.remove("shake"), 300);
        input = "";
        updateDots();
      }
    }
  </script>
</body>
</html>
