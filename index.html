<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passcode Lock</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #000;
    }

    body {
      position: relative;
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100vh;
      background: url("your-background.jpg") center center / cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* 背景模糊层，不挡点击 */
    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 0;
      pointer-events: none;
    }

    /* 再压一层暗色，让文字更像第二张图 */
    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.28);
      z-index: 0;
      pointer-events: none;
    }

    .lock-wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 28px;
    }

    .title {
      color: #ffffff;
      font-size: 20px;
      font-weight: 400;
      text-align: center;
      margin-bottom: 28px;
      text-shadow: 0 1px 10px rgba(0,0,0,0.35);
    }

    .dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
      min-height: 18px;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.92);
      background: transparent;
      transition: all 0.15s ease;
    }

    .dot.filled {
      background: #fff;
    }

    .keypad {
      width: 100%;
      max-width: 320px;
      display: grid;
      grid-template-columns: repeat(3, 86px);
      justify-content: center;
      gap: 18px 22px;
    }

    .key {
      width: 86px;
      height: 86px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.16);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.10),
        0 6px 18px rgba(0,0,0,0.22);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: transform 0.08s ease, background 0.15s ease;
      pointer-events: auto;
    }

    .key:active {
      transform: scale(0.94);
      background: rgba(255,255,255,0.24);
    }

    .num {
      font-size: 22px;
      line-height: 1;
      font-weight: 400;
      margin-bottom: 4px;
      pointer-events: none;
    }

    .letters {
      font-size: 11px;
      line-height: 1;
      letter-spacing: 2px;
      opacity: 0.95;
      pointer-events: none;
    }

    .empty {
      width: 86px;
      height: 86px;
    }

    .bottom-bar {
      width: 100%;
      max-width: 320px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      padding: 0 2px;
    }

    .bottom-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.92);
      font-size: 17px;
      font-weight: 400;
      cursor: pointer;
      pointer-events: auto;
    }

    .message {
      min-height: 22px;
      margin-top: 16px;
      color: #ffb8b8;
      font-size: 15px;
      text-align: center;
      text-shadow: 0 1px 6px rgba(0,0,0,0.25);
    }

    .success-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      justify-content: center;
      align-items: center;
      background: url("your-background.jpg") center center / cover no-repeat;
    }

    .success-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    .success-text {
      position: relative;
      z-index: 2;
      color: #fff;
      font-size: 30px;
      font-weight: 500;
      text-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }

    @media (max-width: 390px) {
      .title {
        font-size: 18px;
      }

      .keypad {
        grid-template-columns: repeat(3, 78px);
        gap: 16px 18px;
        max-width: 300px;
      }

      .key, .empty {
        width: 78px;
        height: 78px;
      }

      .num {
        font-size: 20px;
      }

      .letters {
        font-size: 10px;
      }

      .bottom-bar {
        max-width: 300px;
      }

      .bottom-btn {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="lock-wrap">
      <div class="title">Touch ID or Enter Passcode</div>

      <div class="dots" id="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="keypad">
        <button class="key" type="button" data-num="1">
          <span class="num">1</span>
        </button>

        <button class="key" type="button" data-num="2">
          <span class="num">2</span>
          <span class="letters">ABC</span>
        </button>

        <button class="key" type="button" data-num="3">
          <span class="num">3</span>
          <span class="letters">DEF</span>
        </button>

        <button class="key" type="button" data-num="4">
          <span class="num">4</span>
          <span class="letters">GHI</span>
        </button>

        <button class="key" type="button" data-num="5">
          <span class="num">5</span>
          <span class="letters">JKL</span>
        </button>

        <button class="key" type="button" data-num="6">
          <span class="num">6</span>
          <span class="letters">MNO</span>
        </button>

        <button class="key" type="button" data-num="7">
          <span class="num">7</span>
          <span class="letters">PQRS</span>
        </button>

        <button class="key" type="button" data-num="8">
          <span class="num">8</span>
          <span class="letters">TUV</span>
        </button>

        <button class="key" type="button" data-num="9">
          <span class="num">9</span>
          <span class="letters">WXYZ</span>
        </button>

        <div class="empty"></div>

        <button class="key" type="button" data-num="0">
          <span class="num">0</span>
        </button>

        <div class="empty"></div>
      </div>

      <div class="bottom-bar">
        <button class="bottom-btn" type="button" id="emergencyBtn">Emergency</button>
        <button class="bottom-btn" type="button" id="cancelBtn">Cancel</button>
      </div>

      <div class="message" id="message"></div>
    </div>
  </div>

  <div class="success-screen" id="successScreen">
    <div class="success-text">Unlocked 💖</div>
  </div>

  <audio id="clickSound" src="typing on phone sound effect.mp3" preload="auto"></audio>
  <audio id="unlockSound" src="unlock.mp3" preload="auto"></audio>

  <script>
    const correctPassword = "1229";
    let input = "";

    const dots = document.querySelectorAll(".dot");
    const keys = document.querySelectorAll(".key");
    const message = document.getElementById("message");
    const successScreen = document.getElementById("successScreen");
    const clickSound = document.getElementById("clickSound");
    const unlockSound = document.getElementById("unlockSound");
    const cancelBtn = document.getElementById("cancelBtn");
    const emergencyBtn = document.getElementById("emergencyBtn");

    function playSound(audio) {
      if (!audio) return;
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    function updateDots() {
      dots.forEach((dot, index) => {
        if (index < input.length) {
          dot.classList.add("filled");
        } else {
          dot.classList.remove("filled");
        }
      });
    }

    function resetInput() {
      input = "";
      updateDots();
    }

    function showMessage(text, color = "#ffb8b8") {
      message.textContent = text;
      message.style.color = color;
    }

    function unlock() {
      playSound(unlockSound);
      showMessage("Correct password", "#caffd0");
      setTimeout(() => {
        successScreen.style.display = "flex";
      }, 250);
    }

    function checkPassword() {
      if (input === correctPassword) {
        unlock();
      } else {
        showMessage("Wrong passcode");
        setTimeout(() => {
          resetInput();
          showMessage("");
        }, 500);
      }
    }

    function pressNumber(num) {
      if (input.length >= 4) return;

      playSound(clickSound);
      input += num;
      updateDots();
      showMessage("");

      if (input.length === 4) {
        setTimeout(checkPassword, 150);
      }
    }

    keys.forEach((key) => {
      key.addEventListener("click", function () {
        const num = this.getAttribute("data-num");
        pressNumber(num);
      });

      key.addEventListener("touchstart", function () {
        this.style.transform = "scale(0.94)";
      }, { passive: true });

      key.addEventListener("touchend", function () {
        this.style.transform = "";
      }, { passive: true });
    });

    cancelBtn.addEventListener("click", () => {
      resetInput();
      showMessage("");
    });

    emergencyBtn.addEventListener("click", () => {
      resetInput();
      showMessage("");
    });

    document.addEventListener("keydown", (e) => {
      if (/^[0-9]$/.test(e.key)) {
        pressNumber(e.key);
      } else if (e.key === "Backspace") {
        input = input.slice(0, -1);
        updateDots();
        showMessage("");
      }
    });
  </script>
</body>
</html>
