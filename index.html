<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lock Screen</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial;
}

body {
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* 背景（重点改这里） */
.bg {
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
    url("your-background.jpg") center/cover no-repeat;
  filter: blur(10px);
  transform: scale(1.1);
  z-index: 0;
}

/* 中间微光 */
.bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%);
}

/* 内容 */
.container {
  position: relative;
  z-index: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* 标题 */
.title {
  color: white;
  font-size: 20px;
  margin-bottom: 20px;
  opacity: 0.9;
}

/* 密码点 */
.dots {
  display: flex;
  gap: 15px;
  margin-bottom: 40px;
}

.dot {
  width: 14px;
  height: 14px;
  border: 2px solid white;
  border-radius: 50%;
}

/* 数字键盘 */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 80px);
  gap: 20px;
}

/* 按钮 */
.key {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  backdrop-filter: blur(10px);
  cursor: pointer;
  transition: 0.2s;
}

.key:active {
  background: rgba(255,255,255,0.4);
}

/* 底部 */
.bottom {
  position: absolute;
  bottom: 30px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 40px;
  color: white;
  font-size: 16px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
  <div class="title">Touch ID or Enter Passcode</div>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="keypad">
    <div class="key">1</div>
    <div class="key">2</div>
    <div class="key">3</div>
    <div class="key">4</div>
    <div class="key">5</div>
    <div class="key">6</div>
    <div class="key">7</div>
    <div class="key">8</div>
    <div class="key">9</div>
    <div></div>
    <div class="key">0</div>
    <div></div>
  </div>
</div>

<div class="bottom">
  <div>Emergency</div>
  <div>Cancel</div>
</div>

</body>
</html>
